name: Bug Report
description: Report a reproducible OpenDot issue.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Describe the actual behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Include commands, screenshots, logs, serial output, or a minimal reproduction when useful.
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Contribution track
      options:
        - Voice Pipeline & Providers
        - Voice Agents & Harnesses
        - Platform Control Plane
        - Platform Backend & Data
        - Media Transport
        - Device Communication & Fleet
        - Dot Hardware
        - Dot Firmware & Edge
        - Docs, Tooling & Developer Experience
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Include OS, browser, Node/pnpm versions, device board, firmware version, or provider/runtime configuration when relevant.
  - type: textarea
    attributes:
      label: Additional context
      description: Add any related issues, screenshots, logs, or suspected causes.
